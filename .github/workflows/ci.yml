name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore TaskForge/TaskForge.slnx

      - name: Build solution
        run: dotnet build TaskForge/TaskForge.slnx --configuration Release --no-restore

      - name: Run tests
        run: dotnet test TaskForge/TaskForge.slnx --configuration Release --no-build